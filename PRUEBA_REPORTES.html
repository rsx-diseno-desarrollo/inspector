<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hoja Inspección Tratamientos Térmicos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    input, textarea {
      width: 300px;
      margin-bottom: 8px;
    }

    textarea {
      height: 60px;
    }
  </style>
</head>
<body>

<h2>Nuevo Registro</h2>

<form id="formulario">
  LINEA: <input id="linea" required><br><br>
  ESTACION: <input id="estacion" required><br><br>
  N° DE PARTE: <input id="parte" required><br><br>
  N° HOJA: <input id="hoja" required><br><br>
  ALTURA: <input id="altura" required><br><br>
  <h4>TORCIMIENTO</h4> 
  LADO FIJO: <input id="lf" required><br><br>
  LADO MOVIL: <input id="lm" required><br><br>
  <br><br>
  HOJA CAÍDA: <input id="caida" required><br><br>
  OBSERVACIONES: <textarea id="obs"></textarea><br><br>

  <button type="submit">Generar Reporte</button>
</form>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<script>
document.getElementById("formulario").addEventListener("submit", e => {
  e.preventDefault();

  const hora = new Date().toLocaleTimeString("es-MX", {
    hour: "2-digit",
    minute: "2-digit"
  });

  const dataRow = [
    hora,
    linea.value,
    estacion.value,
    parte.value,
    hoja.value,
    altura.value,
    lf.value,
    lm.value,
    caida.value,
    obs.value || ""
  ];

  const filas = [dataRow];

  // Filas vacías para simular formato físico
  for (let i = 0; i < 18; i++) {
    filas.push(["", "", "", "", "", "", "", "", "", ""]);
  }

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF("l", "mm", "a4");

  const pageWidth = doc.internal.pageSize.getWidth();
  const pageHeight = doc.internal.pageSize.getHeight();

  // ===== ENCABEZADO =====
  doc.setFont("helvetica", "bold");
  doc.setFontSize(14);
  doc.text(
    "HOJA INSPECCIÓN TRATAMIENTOS TÉRMICOS",
    pageWidth / 2,
    15,
    { align: "center" }
  );

  doc.setFontSize(11);
  doc.setFont("helvetica", "normal");
  doc.text(
    "REGISTRO DE INSPECCIÓN DE TRATAMIENTOS TÉRMICOS",
    pageWidth / 2,
    22,
    { align: "center" }
  );

  // Línea separadora
  doc.setLineWidth(0.5);
  doc.line(10, 26, pageWidth - 10, 26);

  // ===== TABLA =====
  doc.autoTable({
    startY: 30,
    theme: "grid",
    head: [[
      "HORA",
      "LÍNEA",
      "ESTACIÓN",
      "NO. DE PARTE",
      "HOJA",
      "ALTURA",
      "TORC. LF",
      "TORC. LM",
      "HOJA CAÍDA",
      "OBSERVACIONES"
    ]],
    body: filas,
    styles: {
      fontSize: 8,
      cellPadding: 2,
      valign: "middle",
      halign: "center",
      lineWidth: 0.2,
      lineColor: 0,
      minCellHeight: 8
    },
    headStyles: {
      fillColor: [245, 124, 0],
      textColor: 0,
      fontStyle: "bold",
      lineWidth: 0.5
    },
    columnStyles: {
      0: { cellWidth: 20 },
      1: { cellWidth: 25 },
      2: { cellWidth: 25 },
      3: { cellWidth: 35 },
      4: { cellWidth: 20 },
      5: { cellWidth: 20 },
      6: { cellWidth: 22 },
      7: { cellWidth: 22 },
      8: { cellWidth: 28 },
      9: { cellWidth: 55 }
    }
  });

  // ===== FOOTER =====
  doc.setFontSize(8);
  doc.text(
    `Generado: ${new Date().toLocaleString("es-MX")}`,
    10,
    pageHeight - 10
  );

  doc.save("hoja_inspeccion_tratamientos_termicos.pdf");
});
</script>

</body>
</html>
