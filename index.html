<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <title>Registro de Inspecciones | Tratamientos Térmicos</title>
</head>
<body>

  <!-- =========================
       BOTÓN INICIAL
  ========================== -->
  <section id="start-section">
    <h1>Registro de Inspección</h1>
    <h2>Área: Tratamientos Térmicos</h2>

    <button id="startReport">
      Iniciar reporte
    </button>
  </section>

  <!-- =========================
       CONTENIDO DEL REPORTE
       (oculto al inicio)
  ========================== -->
  <section id="report-content">

    <!-- DATOS DEL REPORTE -->
    <section id="report-info">
      <h3>Datos del Reporte</h3>

      <label>
        Nombre del inspector:
        <input type="text" id="inspectorName">
      </label><br><br>

      <label>
        Hora del reporte:
        <input type="time" id="reportHour">
      </label>
    </section>

    <hr>

    <!-- FORMULARIO DE INSPECCIÓN -->
    <section id="inspection-form">
      <h3>Registro de Inspección</h3>

      <form id="inspectionForm">

        Línea: <input id="linea"><br>
        Estación: <input id="estacion"><br>
        No. de Parte: <input id="parte"><br>
        No. de Hoja: <input id="hoja"><br>
        Altura: <input type="number" id="altura" step="0.01"><br>

        <strong>Torcimiento</strong><br>
        LF: <input type="number" id="lf" step="0.01"><br>
        LM: <input type="number" id="lm" step="0.01"><br>

        Parte plana: <input type="number" id="partePlana" step="0.01"><br>
        Hoja caída: <input type="number" id="caida" step="0.01"><br>

        Observaciones:<br>
        <textarea id="observaciones"></textarea>
      </form>
    </section>

    <!-- ACCIONES -->
    <section id="actions">
      <button id="saveInspection">
        Guardar registro
      </button>

      <button id="generateReport" disabled>
        Generar reporte
      </button>
    </section>

    <!-- VISTA PREVIA -->
    <section id="preview">
      <h3>Registros guardados</h3>

      <p>
        Total de registros:
        <strong><span id="recordCount">0</span></strong>
      </p>

      <table id="previewTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Hoja</th>
            <th>Altura</th>
            <th>LF</th>
            <th>LM</th>
            <th>Parte plana</th>
            <th>Hoja caída</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
    </section>

  </section>

  <!-- Scripts -->
  <script src="script.js"></script>

</body>
</html>
